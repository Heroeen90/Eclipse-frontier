name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v4.2.2-stable_linux.x86_64 godot
          chmod +x godot
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/
          mv /tmp/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/
          echo "Templates installed:"
          ls ~/.local/share/godot/export_templates/4.2.2.stable/ | head -5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;23.2.8568313"
          echo "NDK_ROOT=$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_ENV

      - name: Create Debug Keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
          echo "Keystore created"

      - name: Setup Godot Android Config
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          
          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/java_sdk_path = "/usr/lib/jvm/temurin-17-amd64"
          EOF
          echo "Godot config created"

      - name: Import Project
        run: |
          ./godot --headless --path . --import --quit 2>&1 || true
          echo "Import done"
          sleep 5

      - name: Create Build Dir
        run: mkdir -p build

      - name: Build APK
        run: |
          ./godot --headless --path . \
            --export-debug "Android" \
            "build/eclipse-frontier.apk" 2>&1
          echo "Build completed"

      - name: Check APK
        run: |
          if [ -f "build/eclipse-frontier.apk" ]; then
            SIZE=$(du -sh build/eclipse-frontier.apk | cut -f1)
            echo "APK created successfully: $SIZE"
          else
            echo "APK not found, checking build folder:"
            ls -la build/ || echo "Build folder empty"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-frontier-apk
          path: build/eclipse-frontier.apk
          if-no-files-found: error
          retention-days: 30
